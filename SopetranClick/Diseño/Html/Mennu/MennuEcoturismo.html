<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecoturismo — SopetranClick</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../Css/ecoturismo.css">
    
</head>
<body style="background:#0a0a0a; margin:0;">

<!--
    ================================================================
    VISTA ECOTURISMO — pega este <section> dentro de tu #main-content
    en Index.html, en lugar del placeholder vista-ecoturismo
    ================================================================
-->
<section id="vista-ecoturismo" class="spa-view">

    <!-- HEADER -->
    <div class="eco-header">
        <button class="eco-back-btn" onclick="navegarA('inicio')">
            <i class="bi bi-chevron-left"></i> back
        </button>
        <div class="eco-titulo">
            <h1>Explorando: Sopetrán</h1>
            <p>Portal de Ecoturismo · Veredas</p>
        </div>
        <span class="eco-badge">SopetranClick</span>
    </div>

    <!-- BREADCRUMB -->
    <div class="eco-breadcrumb" id="eco-breadcrumb">
        <span class="activo">Veredas</span>
    </div>

    <!-- ================================================
         PANTALLA A — LISTADO DE VEREDAS
    ================================================ -->
    <div id="pantalla-veredas">

        <div class="eco-subtitulo">
            <h2>Selecciona una vereda para explorar</h2>
            <p>Cada vereda tiene lugares icónicos que te esperan</p>
        </div>

        <div class="veredas-grid" id="veredas-grid">
            <!-- Las tarjetas se generan por JS -->
        </div>
    </div>

    <!-- ================================================
         PANTALLA B — LUGARES DE LA VEREDA ELEGIDA
    ================================================ -->
    <div id="pantalla-lugares">

        <button class="btn-volver-veredas" onclick="volverAVeredas()">
            <i class="bi bi-chevron-left"></i> Todas las veredas
        </button>

        <!-- Portal info de la vereda -->
        <div class="vereda-portal" id="vereda-portal-info">
            <div class="portal-icono" id="portal-icono">🌿</div>
            <div class="portal-info">
                <h2 id="portal-nombre">Vereda</h2>
                <p id="portal-label">Actual vereda seleccionada · Portal</p>
            </div>
            <div class="portal-dot"></div>
        </div>

        <!-- Grid de lugares -->
        <div class="lugares-grid" id="lugares-grid">
            <!-- Se genera por JS -->
        </div>

    </div>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../Js/MennuEcoturismo.js"></script>
<script src="../../Js/app.js"></script>
</body>
</html>
