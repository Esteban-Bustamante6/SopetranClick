<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopetrán Click - Catálogo Premium</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../../Css/alojamiento.css">
    
    
</head>
<body>

    <!-- Fondo de Pantalla Completa -->
    <div id="mainBg" class="main-background"></div>
    <div class="overlay-vignette"></div>

    <div class="container-fluid content-wrapper">
        <div class="row h-100 g-0">
            
            <!-- Grid de Galería (Izquierda) -->
            <div id="gridGallery" class="col-lg-5 gallery-section">
                <div id="galleryGridItems" class="gallery-grid"></div>
            </div>

            <!-- Panel de Texto (Derecha) -->
            <div id="textPanel" class="col-lg-7 info-section">
                <div class="glass-panel">
                    
                    <!-- Nueva Cabecera: Logo Izquierda, Ojo Derecha -->
                    <div class="panel-header">
                        <div class="brand-group">
                            <img src="https://i.imgur.com/8QO9I5R.png" alt="Logo" class="brand-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3009/3009489.png'">
                            <div>
                                <h6 class="mb-0 fw-bold">Sopetrán Click</h6>
                                <small class="text-white-50">GUÍA DE RECREO</small>
                            </div>
                        </div>
                        <button class="btn-hide-eye" onclick="toggleInterface(false)" title="Ocultar Interfaz">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>

                    <h1 id="nodeTitle" class="title-display"></h1>
                    <p id="nodeDesc" class="description-display"></p>

                    <div class="d-flex flex-column align-items-end mb-2">
                        <div class="d-flex align-items-center gap-2 mb-2 text-white-50">
                            <span id="nodeLoc" class="small"></span>
                            <i class="fa-solid fa-map-pin"></i>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <span id="nodePhone" class="fw-bold text-white"></span>
                            <i class="fa-brands fa-whatsapp text-success fs-5"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Catálogo de Alojamientos (Carrusel de 5) -->
    <div class="stack-footer">
        <div id="accommodationStack" class="stack-container"></div>
    </div>

    <!-- Barra de Navegación Inferior -->
    <div id="bottomNav" class="nav-bar-bottom">
        <button class="nav-control" onclick="moveGallery(-1)">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        <button class="nav-control btn-toggle-view" onclick="toggleInterface(true)">
            <i class="fa-solid fa-eye-slash"></i>
        </button>
        <button class="nav-control" onclick="moveGallery(1)">
            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </div>

    <script src="../../Js/MennuAlojamiento.js"></script>
</body>
</html>
